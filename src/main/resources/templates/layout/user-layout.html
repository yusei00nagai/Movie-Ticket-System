<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>共通レイアウト</title>
</head>
<body>

    <!-- 引数として activeTab （現在の画面名）を受け取る -->
    <div th:fragment="header(activeTab)">
        
        <!-- ヘッダー本体 -->
        <header class="site-header">
            <div class="header-left">
                <!-- 1. ハンバーガーメニューアイコン (JSでイベントを紐付けます) -->
                <div class="hamburger-menu" id="hamburgerMenu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                
                <!-- 2. ロゴ（クリックで TOPページ '/' へ遷移） -->
                <a href="/" class="site-logo">
                    <span class="logo-icon">&#127916;</span>
                    <span class="logo-text">MovieTicket</span>
                </a>
            </div>
            
            <!-- 中央のナビゲーションリンク -->
            <!-- 呼び出し元から渡された activeTab の値で判定する -->
            <nav class="nav-links">
                <!-- activeTabが 'movies' かつ statusがupcomingでない場合のみアクティブ -->
                <a href="/movies" th:class="${activeTab == 'movies' and status != 'upcoming'} ? 'active-tab' : ''">上映中</a>
                
                <!-- activeTabが 'movies' かつ statusがupcomingの時のみアクティブ -->
                <a href="/movies?status=upcoming" th:class="${activeTab == 'movies' and status == 'upcoming'} ? 'active-tab' : ''">公開予定</a>
                
                <!-- activeTabが 'theaters' の時のみアクティブ -->
                <a href="/theaters" th:class="${activeTab == 'theaters'} ? 'active-tab' : ''">劇場一覧</a>
            </nav>
            
            <!-- 右側のログイン・会員登録等 -->
            <div class="auth-buttons">
                <!-- ▼ 未ログイン時 (!isAuthenticated()) に表示されるボタン ▼ -->
                <th:block sec:authorize="!isAuthenticated()">
                    <a href="/login" class="btn-login">ログイン</a>
                    <a href="/register" class="btn-register">新規登録</a>
                </th:block>

                <!-- ▼ ログイン済 (isAuthenticated()) に表示されるボタン ▼ -->
                <th:block sec:authorize="isAuthenticated()">
                    <!-- マイページへ（デザインはログインボタンと同じものを流用） -->
                    <a href="/mypage" class="btn-login">マイページ</a>
                    
                    <!-- ログアウトはSpring Securityの仕様上、必ずPOSTリクエストで送る -->
                    <form th:action="@{/logout}" method="post" style="margin: 0; display: inline-flex;">
                        <button type="submit" class="btn-logout">ログアウト</button>
                    </form>
                </th:block>
            </div>
        </header>

        <!-- ▼ 3. サイドメニュー（左からスライドイン） ▼ -->
        <!-- 背景を暗くする半透明の幕 -->
        <div class="side-menu-overlay" id="sideMenuOverlay"></div>
        
        <!-- メニュー本体 -->
        <div class="side-menu" id="sideMenu">
            <div class="side-menu-header">
                <h3>Menu</h3>
                <button class="close-menu" id="closeMenuBtn">&times;</button>
            </div>
            <ul class="side-menu-list">
                <li><a href="/">TOPページ</a></li>
                <li sec:authorize="isAuthenticated()"><a href="/mypage">マイページ（購入履歴）</a></li>
                <li sec:authorize="!isAuthenticated()"><a href="/login">ログイン</a></li>
                <li><a href="/movies">上映中作品</a></li>
                <li><a href="/movies?status=upcoming">公開予定作品</a></li>
                <li><a href="/theaters">劇場一覧</a></li>
            </ul>
        </div>

        <!-- ▼ 外部JSの読み込み ▼ -->
        <script th:src="@{/js/user-layout.js}"></script>
        
    </div>

</body>
</html>
