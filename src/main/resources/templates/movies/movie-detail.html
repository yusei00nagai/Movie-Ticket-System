<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${movie.title}">映画詳細</title>
    <link rel="stylesheet" th:href="@{/css/user-layout.css}">
    <link rel="stylesheet" th:href="@{/css/movies.css}">
    <!-- CSSは完成版のmovie-detail.cssを読み込みます -->
    <link rel="stylesheet" th:href="@{/css/movie-detail.css}">
</head>
<body>
    
    <div th:replace="~{layout/user-layout :: header('movie-detail')}"></div>
    
    <main>
        <section class="movieSection">
            <!-- ▼ 1. 上部：映画詳細情報（2カラム） ▼ -->
            <div class="movie-detail-container">
                
                <!-- 左カラム：メイン画像とタイトル -->
                <div class="left-col">
                    <img th:src="@{/images/600x380.png}" alt="メイン画像" class="main-img">
                    <h2 class="movie-title" th:text="${movie.title}">映画タイトル</h2>
                </div>
                
                <!-- 右カラム：サブ画像とあらすじ・情報 -->
                <div class="right-col">
                    <!-- サブ画像4枚（クラスを付与しJSで制御） -->
                    <div class="sub-img-row">
                        <img th:each="i : ${#numbers.sequence(1, 4)}"
                             th:src="@{/images/600x380.png}" 
                             alt="サブ画像"
                             class="sub-img">
                    </div>
                    
                    <p class="description" th:text="${movie.description}">
                        映画のあらすじがここに入ります。
                    </p>
                    
                    <!-- 上映時間の情報帯 -->
                    <p class="movie-info-bar">
                        上映時間：<span th:text="${movie.duration}">120</span>分
                    </p>
                </div>
            </div>

            <!-- ▼ 2. 下部：上映スケジュール（エリア別タブ＆劇場リスト） ▼ -->
            <div class="schedule-container">
                
                <h3>上映スケジュール</h3>
                
                <!-- ▼ エリア切り替えタブ ▼ -->
                <!-- JS識別のためのクラスと data-area-id を付与 -->
                <ul class="area-tabs" th:if="${theaterMap != null}">
                    <li th:each="areaEntry, stat : ${theaterMap}"
                        th:classappend="${stat.first} ? 'active area-tab' : 'area-tab'"
                        th:data-area-id="'area-' + ${stat.index}"
                        th:text="${areaEntry.key}">エリア名</li>
                </ul>

                <!-- ▼ 各エリアの劇場リスト ▼ -->
                <div th:each="areaEntry, stat : ${theaterMap}"
                     th:id="'area-' + ${stat.index}"
                     class="theater-list-container"
                     th:classappend="${stat.first} ? 'active' : ''">
                    
                    <!-- そのエリアに属する劇場をループで出力 -->
                    <div th:each="theater : ${areaEntry.value}" class="theater-item">
                        
                        <!-- 都道府県 -->
                        <div class="pref-name" th:text="'[' + ${theater.location} + ']'">[都道府県]</div>
                        
                        <!-- 劇場名と矢印 -->
                        <div class="theater-name-row">
                            <span class="theater-name" th:text="${theater.name}">劇場名</span>
                            <span class="arrow">▼</span>
                        </div>
                        
                        <!-- ▼ アコーディオンで開くカレンダー部分 ▼ -->
                        <div class="accordion-content">
                            
                            <!-- 日付タブ (JS識別のためのクラスと data-target-date を付与) -->
                            <ul class="date-tabs">
                                <li class="date-tab active" th:data-target-date="'date-1-' + ${theater.id}">
                                    <span class="month-day">6/19</span>
                                    <span class="day-of-week">(金)</span>
                                </li>
                                <li class="date-tab" th:data-target-date="'date-2-' + ${theater.id}">
                                    <span class="month-day">6/20</span>
                                    <span class="day-of-week">(土)</span>
                                </li>
                            </ul>

                            <!-- タイムテーブル領域 -->
                            <div class="timetable-wrapper">
                                <!-- 6/19用のスケジュール -->
                                <div th:id="'date-1-' + ${theater.id}" class="timetable-panel active">
                                    <p class="timetable-note">※座席を選択するには時間枠をクリックしてください。</p>
                                    <div class="time-box-list">
                                        <a href="/reservations/seat?showtimeId=1" class="time-box ok">
                                            <span class="time">10:00 ~ 12:00</span>
                                            <span class="screen">Screen 1</span>
                                            <span class="status-mark">〇</span>
                                        </a>
                                        <a href="/reservations/seat?showtimeId=2" class="time-box few">
                                            <span class="time">13:30 ~ 15:30</span>
                                            <span class="screen">Screen 3</span>
                                            <span class="status-mark">△</span>
                                        </a>
                                        <div class="time-box full">
                                            <span class="time">19:00 ~ 21:00</span>
                                            <span class="screen">Screen 2</span>
                                            <span class="status-mark">×</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- 6/20用のスケジュール -->
                                <div th:id="'date-2-' + ${theater.id}" class="timetable-panel">
                                    <div class="time-box-list empty-message">
                                        <p>この日の上映スケジュールはありません。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- アコーディオンここまで -->
                        
                    </div>
                    
                    <!-- 劇場が0件の場合のメッセージ -->
                    <div th:if="${#lists.isEmpty(areaEntry.value)}" class="theater-item empty-message">
                        <span class="theater-name">このエリアでの上映スケジュールは現在ありません。</span>
                    </div>
                    
                </div>

                <!-- ▼ 3. ボタンエリア ▼ -->
                <div class="btnArea">
                    <div class="nowMovieArea">
                        <a href="/movies">上映中作品一覧はこちら</a>
                    </div>
                    <div class="upcomingMovieArea">
                        <a href="/movies?status=upcoming">公開予定作品一覧はこちら</a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- ▼ 画像拡大用のモーダル領域 ▼ -->
    <div id="imageModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <!-- ▼ ページトップへ戻るボタン ▼ -->
    <!-- スクロール検知やクリック処理は完全にJSファイル側で制御します -->
    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="ページトップへ戻る">▲</button>

    <!-- JavaScript処理（キャッシュ対策パラメータ） -->
    <script th:src="@{/js/movie-detail.js?v=7}"></script>
    
</body>
</html>
